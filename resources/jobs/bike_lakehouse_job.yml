resources:
  jobs:
    bike_lakehouse_job:
      name: bike_lakehouse_pipeline_dev
      description: BikeStore medallion pipeline. Bronze to Silver to Gold. Daily at 02:00 AM.

      schedule:
        quartz_cron_expression: "0 0 2 * * ?"
        timezone_id: Africa/Lagos
        pause_status: PAUSED

      max_concurrent_runs: 1

      tasks:
        - task_key: bronze_ingestion
          notebook_task:
            notebook_path: /Users/ntedaniells@gmail.com/databricks_project/Code/Bronze/Bronze
          timeout_seconds: 3600
          max_retries: 2

        - task_key: silver_crm_customers
          depends_on:
            - task_key: bronze_ingestion
          notebook_task:
            notebook_path: /Users/ntedaniells@gmail.com/databricks_project/Code/Silver/silver_crm_cust_info
          timeout_seconds: 1800
          max_retries: 2

        - task_key: silver_crm_products
          depends_on:
            - task_key: bronze_ingestion
          notebook_task:
            notebook_path: /Users/ntedaniells@gmail.com/databricks_project/Code/Silver/silver_crm_prd_info
          timeout_seconds: 1800
          max_retries: 2

        - task_key: silver_crm_sales
          depends_on:
            - task_key: bronze_ingestion
          notebook_task:
            notebook_path: /Users/ntedaniells@gmail.com/databricks_project/Code/Silver/silver_crm_sales_details
          timeout_seconds: 1800
          max_retries: 2

        - task_key: silver_erp_customers
          depends_on:
            - task_key: bronze_ingestion
          notebook_task:
            notebook_path: /Users/ntedaniells@gmail.com/databricks_project/Code/Silver/silver_erp_cust_az12
          timeout_seconds: 1800
          max_retries: 2

        - task_key: silver_erp_locations
          depends_on:
            - task_key: bronze_ingestion
          notebook_task:
            notebook_path: /Users/ntedaniells@gmail.com/databricks_project/Code/Silver/silver_erp_loc_a101
          timeout_seconds: 1800
          max_retries: 2

        - task_key: silver_erp_categories
          depends_on:
            - task_key: bronze_ingestion
          notebook_task:
            notebook_path: /Users/ntedaniells@gmail.com/databricks_project/Code/Silver/silver_erp_px_cat_g1v2
          timeout_seconds: 1800
          max_retries: 2

        - task_key: gold_dim_customers
          depends_on:
            - task_key: silver_crm_customers
            - task_key: silver_erp_customers
            - task_key: silver_erp_locations
          notebook_task:
            notebook_path: /Users/ntedaniells@gmail.com/databricks_project/Code/Gold/gold.dim_customers
          timeout_seconds: 1800
          max_retries: 1

        - task_key: gold_dim_products
          depends_on:
            - task_key: silver_crm_products
            - task_key: silver_erp_categories
          notebook_task:
            notebook_path: /Users/ntedaniells@gmail.com/databricks_project/Code/Gold/gold.dim_products
          timeout_seconds: 1800
          max_retries: 1

        - task_key: gold_fact_sales
          depends_on:
            - task_key: gold_dim_customers
            - task_key: gold_dim_products
            - task_key: silver_crm_sales
          notebook_task:
            notebook_path: /Users/ntedaniells@gmail.com/databricks_project/Code/Gold/gold.fact_sales
          timeout_seconds: 1800
          max_retries: 1

      email_notifications:
        on_failure:
          - datawithdany@gmail.com
        on_success:
          - datawithdany@gmail.com